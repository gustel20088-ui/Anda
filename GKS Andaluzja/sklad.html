        }

        nav ul li a {

            font-size: 0.9em;

            margin: 0 auto;

            color: #ffcc00;
        }

        }

        .social-links a {
            color: white;
            text-decoration: none;
            margin-right: 15px;
            font-weight: bold;
            transition: color 0.3s;
        }

        .social-links a:hover {
            color: #ffcc00;
        }

        .footer-bottom {

            font-size: 0.8em;
            border-top: 1px solid #333;

            color: #888;

        .social-links a {

            text-decoration: none;
